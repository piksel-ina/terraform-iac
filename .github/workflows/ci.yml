name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: "1.14.8"
  TF_DOCS_VERSION: "v0.19.0"

jobs:
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check formatting
        id: fmt
        run: |
          echo "::group::terraform fmt -check -recursive -diff"
          terraform fmt -check -recursive -diff 2>&1 | tee fmt-output.txt
          echo "::endgroup::"

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.fmt.outcome }}" == "success" ]; then
            echo "## :white_check_mark: Formatting — All files pass" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## :x: Formatting — Files need formatting"
              echo ""
              echo '```diff'
              cat fmt-output.txt
              echo '```'
              echo ""
              echo "Run \`terraform fmt -recursive\` to fix."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  validate:
    name: Validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [staging, dev]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        id: init
        run: |
          echo "::group::terraform init (${{ matrix.env }})"
          terraform -chdir=${{ matrix.env }} init -backend=false 2>&1 | tee init-output.txt
          echo "::endgroup::"

      - name: Validate
        id: validate
        run: |
          echo "::group::terraform validate (${{ matrix.env }})"
          terraform -chdir=${{ matrix.env }} validate 2>&1 | tee validate-output.txt
          echo "::endgroup::"

      - name: Job summary
        if: always()
        run: |
          STATUS="${{ steps.validate.outcome }}"
          if [ "$STATUS" == "success" ]; then
            echo "## :white_check_mark: Validate (${{ matrix.env }}) — Valid configuration" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## :x: Validate (${{ matrix.env }}) — Validation failed"
              echo ""
              echo '```'
              cat validate-output.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  docs:
    name: Terraform Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install terraform-docs
        uses: jaxxstorm/action-install-gh-release@v3.0.0
        with:
          repo: terraform-docs/terraform-docs
          tag: ${{ env.TF_DOCS_VERSION }}
          cache: enable

      - name: Check docs are up-to-date
        id: docs
        run: |
          MODULES=(
            applications
            networks
            aws-database
            external-dns
            aws-eks-cluster
            aws-s3-bucket
            karpenter
            secrets-management
            staging
          )

          echo "::group::Regenerating docs"
          for mod in "${MODULES[@]}"; do
            if [ -f "$mod/main.tf" ]; then
              echo "  $mod/"
              terraform-docs markdown table --output-file README.md --output-mode inject "$mod/"
            fi
          done
          echo "::endgroup::"

          if ! git diff --exit-code -- '*.md'; then
            CHANGED=$(git diff --name-only -- '*.md' | head -20)
            {
              echo "changed<<EOF"
              echo "$CHANGED"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "::error::Terraform docs are out of date. Run 'pre-commit run terraform_docs --all-files' or update READMEs manually."
            exit 1
          fi

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.docs.outcome }}" == "success" ]; then
            echo "## :white_check_mark: Docs — All READMEs up-to-date" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## :x: Docs — READMEs need regeneration"
              echo ""
              echo "**Outdated files:**"
              echo ""
              echo '```'
              echo "${{ steps.docs.outputs.changed }}"
              echo '```'
              echo ""
              echo "Run \`pre-commit run terraform_docs --all-files\` to fix."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  checkov:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: true
          output_format: cli
          config_file: .checkov.yml

      - name: Job summary
        if: always()
        run: |
          if [ "${{ steps.checkov.outcome }}" == "success" ]; then
            echo "## :white_check_mark: Security Scan — No new issues found" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## :warning: Security Scan — Issues detected (soft-fail)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo ""
          echo "Config: \`.checkov.yml\` | Mode: \`soft_fail: true\`" >> "$GITHUB_STEP_SUMMARY"
