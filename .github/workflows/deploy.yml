name: Terraform Deploy

on:
  pull_request:
    branches: [main]
    paths: ['**.tf', '**.tfvars']
  push:
    branches: [main]
    paths: ['**.tf', '**.tfvars']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  AWS_REGION: "ap-southeast-3"
  PLAN_OUTPUT_BUCKET: "piksel-staging-tfstate"
  PLAN_PROJECT: "Piksel-tf-plan"
  APPLY_PROJECT: "Piksel-tf-apply"

jobs:
  plan:
    name: Terraform Plan (Staging)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326641642924:role/piksel-tf-deploy-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger CodeBuild plan
        id: codebuild
        env:
          TF_VARS_CONTENT: ${{ secrets.STAGING_TFVARS }}
        # checkov:skip=CKV_GHA_2: inputs are GitHub-controlled env vars/secrets, not user-supplied event fields
        run: |
          TFVARS_B64=$(echo "$TF_VARS_CONTENT" | base64 -w 0)
          BUILD_ID=$(aws codebuild start-build \
            --project-name "$PLAN_PROJECT" \
            --environment-variables-override \
              name=TF_ACTION,value=plan \
              name=PR_NUMBER,value=${{ github.event.pull_request.number }} \
              name=PR_BRANCH,value=${{ github.head_ref }} \
              name=BRANCH,value= \
              "name=STAGING_TFVARS_B64,value=${TFVARS_B64}" \
              name=PLAN_OUTPUT_BUCKET,value=$PLAN_OUTPUT_BUCKET \
            --query 'build.id' \
            --output text)

          BUILD_NUMBER=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
            --query 'builds[0].buildNumber' --output text)
          BUILD_URL="https://${AWS_REGION}.console.aws.amazon.com/codesuite/codebuild/projects/${PLAN_PROJECT}/build/${PLAN_PROJECT}%3A${BUILD_NUMBER}"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

          echo "::notice::CodeBuild #$BUILD_NUMBER started — $BUILD_URL"
          echo "::group::CodeBuild plan #$BUILD_NUMBER"
          echo "Project:  $PLAN_PROJECT"
          echo "Build:    #$BUILD_NUMBER"
          echo "ID:       $BUILD_ID"
          echo "Console:  $BUILD_URL"
          echo ""
          echo "Polling status..."
          echo ""

          SECONDS=0
          LAST_PHASE=""
          while true; do
            BUILD_INFO=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --query 'builds[0].{Status:buildStatus,Phase:currentPhase}' --output text)
            STATUS=$(echo "$BUILD_INFO" | awk '{print $1}')
            PHASE=$(echo "$BUILD_INFO" | awk '{print $2}')
            ELAPSED=$(( SECONDS / 60 ))m$(( SECONDS % 60 ))s

            if [ "$PHASE" != "$LAST_PHASE" ]; then
              echo "[$ELAPSED] Phase: $PHASE"
              LAST_PHASE="$PHASE"
            fi

            if [ "$STATUS" != "IN_PROGRESS" ]; then
              echo ""
              echo "Build completed: $STATUS (${ELAPSED})"
              break
            fi
            sleep 15
          done
          echo "::endgroup::"

          if [ "$STATUS" != "SUCCEEDED" ]; then
            echo "::error::CodeBuild failed with status $STATUS — $BUILD_URL"
            exit 1
          fi

          echo ""
          echo "Plan completed in ${ELAPSED}"

      - name: Fetch and post plan output
        if: always() && steps.codebuild.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const buildId = `${{ steps.codebuild.outputs.build_id }}`;

            try {
              const listOutput = execSync(
                `aws s3 ls s3://${process.env.PLAN_OUTPUT_BUCKET}/plans/ --recursive | grep "${buildId.replace(/:/g, '\\\\:')}" | tail -1 | awk '{print $4}'`,
                { encoding: 'utf8' }
              );
              const key = listOutput.trim();
              if (!key) {
                console.log('No plan output found in S3');
                return;
              }

              const plan = execSync(
                `aws s3 cp s3://${process.env.PLAN_OUTPUT_BUCKET}/${key} -`,
                { encoding: 'utf8', maxBuffer: 10 * 1024 * 1024 }
              );

              const buildNumber = `${{ steps.codebuild.outputs.build_number }}`;
              const buildUrl = `${{ steps.codebuild.outputs.build_url }}`;
              const body = `## Terraform Plan (Staging)\n\n> **CodeBuild #${buildNumber}** — [View in AWS Console](${buildUrl})\n\n<details><summary>Plan output</summary>\n\n\`\`\`hcl\n${plan.substring(0, 60000)}\n\`\`\`\n\n</details>`;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } catch (e) {
              console.log('Failed to fetch plan output:', e.message);
            }

      - name: Job summary
        if: always()
        run: |
          STATUS="${{ steps.codebuild.outcome }}"
          BUILD="${{ steps.codebuild.outputs.build_number || 'N/A' }}"
          URL="${{ steps.codebuild.outputs.build_url }}"
          {
            echo "## Plan Result: ${STATUS}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Build** | #${BUILD} |"
            echo "| **Console** | [View in AWS](${URL}) |"
            echo "| **Trigger** | PR #${{ github.event.pull_request.number }} (${{ github.head_ref }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Terraform Apply (Staging)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326641642924:role/piksel-tf-deploy-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger CodeBuild apply
        id: codebuild
        env:
          TF_VARS_CONTENT: ${{ secrets.STAGING_TFVARS }}
        # checkov:skip=CKV_GHA_2: inputs are GitHub-controlled env vars/secrets, not user-supplied event fields
        run: |
          TFVARS_B64=$(echo "$TF_VARS_CONTENT" | base64 -w 0)
          BUILD_ID=$(aws codebuild start-build \
            --project-name "$APPLY_PROJECT" \
            --environment-variables-override \
              name=TF_ACTION,value=apply \
              name=PR_NUMBER,value= \
              name=PR_BRANCH,value= \
              name=BRANCH,value=${{ github.ref_name }} \
              "name=STAGING_TFVARS_B64,value=${TFVARS_B64}" \
              name=PLAN_OUTPUT_BUCKET,value=$PLAN_OUTPUT_BUCKET \
            --query 'build.id' \
            --output text)

          BUILD_NUMBER=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
            --query 'builds[0].buildNumber' --output text)
          BUILD_URL="https://${AWS_REGION}.console.aws.amazon.com/codesuite/codebuild/projects/${APPLY_PROJECT}/build/${APPLY_PROJECT}%3A${BUILD_NUMBER}"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

          echo "::notice::CodeBuild #$BUILD_NUMBER started — $BUILD_URL"
          echo "::group::CodeBuild apply #$BUILD_NUMBER"
          echo "Project:  $APPLY_PROJECT"
          echo "Build:    #$BUILD_NUMBER"
          echo "ID:       $BUILD_ID"
          echo "Console:  $BUILD_URL"
          echo ""
          echo "Polling status..."
          echo ""

          SECONDS=0
          LAST_PHASE=""
          while true; do
            BUILD_INFO=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --query 'builds[0].{Status:buildStatus,Phase:currentPhase}' --output text)
            STATUS=$(echo "$BUILD_INFO" | awk '{print $1}')
            PHASE=$(echo "$BUILD_INFO" | awk '{print $2}')
            ELAPSED=$(( SECONDS / 60 ))m$(( SECONDS % 60 ))s

            if [ "$PHASE" != "$LAST_PHASE" ]; then
              echo "[$ELAPSED] Phase: $PHASE"
              LAST_PHASE="$PHASE"
            fi

            if [ "$STATUS" != "IN_PROGRESS" ]; then
              echo ""
              echo "Build completed: $STATUS (${ELAPSED})"
              break
            fi
            sleep 15
          done
          echo "::endgroup::"

          if [ "$STATUS" != "SUCCEEDED" ]; then
            echo "::error::CodeBuild failed with status $STATUS — $BUILD_URL"
            exit 1
          fi

          echo ""
          echo "Apply completed in ${ELAPSED}"

      - name: Job summary
        if: always()
        run: |
          STATUS="${{ steps.codebuild.outcome }}"
          BUILD="${{ steps.codebuild.outputs.build_number || 'N/A' }}"
          URL="${{ steps.codebuild.outputs.build_url }}"
          {
            echo "## Apply Result: ${STATUS}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Build** | #${BUILD} |"
            echo "| **Console** | [View in AWS](${URL}) |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Trigger** | ${{ github.event_name }} |"
          } >> "$GITHUB_STEP_SUMMARY"
